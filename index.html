<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Álbum 2026</title>
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#009739">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-top">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img src="logo.png" alt="Logo" style="width: 45px; height: 45px; border-radius: 8px; border: 2px solid #fedd00;">
                    <h1>MEU ÁLBUM 2026</h1>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="btn-instalar" class="badge-btn" style="background:#012169; display:none;">INSTALAR APP</button>
                    <button id="btn-repetidas" class="badge-btn" style="background:#d32f2f;">REPETIDAS</button>
                </div>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchSticker" placeholder="🔍 Buscar figurinha (ex: BRA10)">
            </div>

            <div class="progress-container">
                <div class="progress-info">
                    <span>Progresso: <strong id="progress-percent">0%</strong></span>
                    <span><strong id="total-count">0</strong> / <span id="max-total">670</span></span>
                </div>
                <div class="progress-bar-bg">
                    <div id="bar"></div>
                </div>
            </div>
        </div>
    </header>

    <div id="aviso-ios" style="display:none; background: #012169; color: white; padding: 12px; font-size: 0.85rem; text-align: center; border-bottom: 3px solid #fedd00; line-height: 1.4;">
        📱 <strong>Para instalar no iPhone:</strong> Toque em <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Share_icon_iOS.svg/1200px-Share_icon_iOS.svg.png" width="16" style="filter: invert(1); vertical-align: middle;"> e depois em <strong>"Adicionar à Tela de Início"</strong>.
        <span id="fechar-aviso" style="margin-left: 15px; font-weight: bold; cursor: pointer; text-decoration: underline;">[X]</span>
    </div>

    <main id="album-content"></main>

    <div id="modal-repetidas" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin:0; color:#009739;">Minhas Repetidas</h2>
                <span class="close-modal" style="cursor:pointer; font-size:28px;">&times;</span>
            </div>
            <div id="lista-repetidas" class="sticker-grid" style="margin-top:20px; max-height:60vh; overflow-y:auto;"></div>
            <button id="btn-whatsapp" class="btn-whatsapp">Compartilhar no WhatsApp</button>
        </div>
    </div>

    <footer class="main-footer">
        <p class="footer-instruction">📱 1 Toque: Add | 2 Toques: Remover</p>
        <div class="footer-credits">
            <span>© 2026 Hugo Gomes</span>
            <a href="https://www.instagram.com/h.gomes04" target="_blank" class="insta-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Insta"> @h.gomes04
            </a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
