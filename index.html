<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Álbum 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009739">
    <link rel="stylesheet" href="style.css?v=4.0">
</head>
<body>

    <div id="modal-anuncio" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; padding: 20px;">
        <div style="background:white; padding:15px; border-radius:20px; text-align:center; max-width:400px; width:100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-size: 0.7rem; color: #999; font-weight: bold; text-transform: uppercase;">Publicidade</span>
                <button id="btn-pular-ads" disabled style="background: #eee; color: #888; border: none; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.7rem;">Aguarde...</button>
            </div>
            
            <div style="width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #f0f0f0;">
                <img src="ads.PNG" alt="Anúncio" style="width: 100%; display: block;">
            </div>

            <div style="background: #f0fdf4; border: 2px solid #009739; border-radius: 12px; padding: 12px; cursor: pointer;" onclick="navigator.clipboard.writeText('18981427594'); alert('PIX Copiado!');">
                <small style="color: #666; display: block; margin-bottom: 4px; font-size: 0.7rem; font-weight: bold;">APOIE O PROJETO VIA PIX:</small>
                <strong style="color: #012169; font-size: 1.1rem;">18981427594</strong>
            </div>
        </div>
    </div>

    <header>
        <div class="header-container" style="max-width: 600px; margin: 0 auto; padding: 10px 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <img src="logo.png" style="width: 40px; height: 40px; border-radius: 8px;">
                    <h1 style="color: white; margin: 0; font-size: 1rem;">MEU ÁLBUM 2026</h1>
                </div>
                <button id="btn-repetidas" style="background:#d32f2f; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 900; font-size: 0.6rem;">REPETIDAS</button>
            </div>
            
            <div style="margin-top: 15px;">
                <input type="text" id="searchSticker" placeholder="🔍 Buscar figurinha (ex: BRA10)" style="width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold;">
            </div>

            <div style="margin-top: 15px; color: white; font-weight: bold; font-size: 0.8rem;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Progresso: <span id="progress-percent">0%</span></span>
                    <span><span id="total-count">0</span> / 994</span>
                </div>
                <div style="background: rgba(0,0,0,0.2); height: 10px; border-radius: 5px; margin-top: 5px; overflow: hidden;">
                    <div id="bar" style="background: #fedd00; height: 100%; width: 0%; transition: 0.5s;"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="album-content"></main>

    <footer style="position: fixed; bottom: 0; width: 100%; height: 80px; background: #009739; color: white; border-top: 4px solid #fedd00; z-index: 1000; text-align: center; display: flex; flex-direction: column; justify-content: center;">
        <p style="margin: 0; font-size: 0.7rem; font-weight: 900;">📱 1 Toque: Adicionar | 2 Toques: Remover</p>
        <p style="margin: 5px 0 0; font-size: 0.6rem;">© 2026 Hugo Gomes | @h.gomes04</p>
    </footer>

    <script src="script.js?v=4.0"></script>
</body>
</html>
