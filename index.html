<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Álbum 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#009739">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css?v=1.9">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-top" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <img src="logo.png" alt="Logo" onerror="this.style.display='none'" style="width: 42px; height: 42px; border-radius: 8px; border: 2px solid #fedd00;">
                    <h1 style="color: white; margin: 0; font-size: 1.1rem;">MEU ÁLBUM 2026</h1>
                </div>
                
                <div style="display: flex; gap: 6px;">
                    <button id="btn-instalar" class="badge-btn" style="display: none; background: #fedd00; color: #012169; border: none; padding: 8px 10px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase;">Baixar App</button>
                    <button id="btn-repetidas" class="badge-btn" style="background:#d32f2f; color: white; border: none; padding: 8px 10px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase;">Repetidas</button>
                </div>
            </div>
            
            <div class="search-container" style="margin-top: 15px;">
                <input type="text" id="searchSticker" placeholder="🔍 Buscar figurinha (ex: BRA10)" style="width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; outline: none;">
            </div>

            <div class="progress-container" style="margin-top: 15px;">
                <div class="progress-info" style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; color: white; font-weight: bold;">
                    <span>Progresso: <strong id="progress-percent">0%</strong></span>
                    <span><strong id="total-count">0</strong> / <span id="max-total">994</span></span>
                </div>
                <div class="progress-bar-bg" style="background: rgba(0,0,0,0.2); height: 12px; border-radius: 6px; overflow: hidden;">
                    <div id="bar" style="background: #fedd00; height: 100%; width: 0%; transition: width 0.4s ease;"></div>
                </div>
            </div>
        </div>
    </header>

    <div id="ios-install-banner" class="ios-banner" style="display: none;">
        <div class="ios-banner-content">
            <div class="ios-icon">
                <img src="logo.png" alt="App Icon" style="width: 45px; height: 45px; border-radius: 10px;">
            </div>
            <div class="ios-text">
                <strong>Instalar App no iPhone</strong>
                <span>Toque em <img src="https://img.icons8.com/ios/50/000000/export.png" width="15"> e depois em <b>"Adicionar à Tela de Início"</b></span>
            </div>
            <button class="ios-close" onclick="this.parentElement.parentElement.style.display='none'">×</button>
        </div>
    </div>

    <div class="apoio-container">
        <div class="apoio-card">
            <div class="apoio-texto">
                <strong>🚀 Gostou do App?</strong>
                <span>Ajude a manter o projeto no ar!</span>
            </div>
            <div class="pix-box" id="copy-pix">
                <span id="chave-pix">18981427594</span>
                <small>Clique para copiar PIX</small>
            </div>
        </div>
    </div>

    <main id="album-content"></main>

    <footer class="main-footer">
        <p style="margin: 0; font-size: 0.8rem; font-weight: 800;">📱 1 Toque: Adicionar | 2 Toques: Remover</p>
        <div class="footer-credits">
            <span>© 2026 Hugo Gomes</span>
            <a href="https://www.instagram.com/h.gomes04" target="_blank" style="color: white !important; text-decoration: none; font-weight: bold;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="14"> @h.gomes04
            </a>
        </div>
    </footer>

    <script src="script.js?v=1.9"></script>
</body>
</html>
