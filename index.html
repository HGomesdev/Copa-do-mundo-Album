<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Álbum Brasil 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-top">
                <h1>BRASIL 2026</h1>
                <span class="badge">COLECIONADOR</span>
            </div>
            <div class="progress-container">
                <div class="progress-info">
                    <span>Progresso: <strong id="progress-percent">0%</strong></span>
                    <span><strong id="total-count">0</strong> / <span id="max-total">0</span></span>
                </div>
                <div class="progress-bar-bg">
                    <div id="bar"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="album-content"></main>

    <footer>
        <p>📱 Clique: Adicionar | Segure: Remover</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
